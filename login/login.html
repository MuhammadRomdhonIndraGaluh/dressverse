<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DressVerse Login</title>

    <link rel="stylesheet" href="login.css">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left-side">

        <img src="../foto/hal login.png" alt="Login Image">

    </div>

    <!-- RIGHT -->
    <div class="right-side">

        <!-- LOGO -->
        <h2 class="logo">DressVerse</h2>

        <!-- TITLE -->
        <h1 class="title">Login</h1>

        <!-- ROLE -->
        <div class="role-tabs">

            <button class="active" type="button">
                User
            </button>

            <button type="button">
                Designer
            </button>

            <button type="button">
                Event Org
            </button>

        </div>

        <!-- FORM -->
        <form id="loginForm">

            <label>Email</label>

            <input 
                type="email" 
                id="email"
                placeholder="Enter your email"
                required
            >

            <label>Password</label>

            <input 
                type="password" 
                id="password"
                placeholder="Enter your password"
                required
            >

            <!-- FORGOT -->
            <div class="forgot">

                <a href="forgot.html">
                    Forgot Password?
                </a>

            </div>

            <!-- BUTTON -->
            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <!-- REGISTER -->
        <div class="register-text">

            Don't have an account?
            <a href="register.html">
                Register
            </a>

        </div>

        <!-- DIVIDER -->
        <div class="divider">

            <span></span>

            <p>Or Continue with</p>

            <span></span>

        </div>

        <!-- GOOGLE -->
        <div class="google-login">

            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" 
            alt="Google">
            
        </div>

    </div>

</div>

<script>
let selectedRole = "user";

const tabs =
document.querySelectorAll(
    ".role-tabs button"
);

tabs.forEach(tab => {

    tab.addEventListener(
        "click",
        () => {

            tabs.forEach(item => {
                item.classList.remove("active");
            });

            tab.classList.add("active");

            const tabName =
            tab.innerText.trim();

            if(tabName === "User"){

                selectedRole = "user";

            }
            else if(tabName === "Designer"){

                selectedRole = "designer";

            }
            else if(tabName === "Event Org"){

                selectedRole = "event_orga";

            }

        }
    );

});

// Menyamakan variasi nama role EO
function normalizeRole(role){

    if(
        role === "event_orga" ||
        role === "event_organizer" ||
        role === "event_org"
    ){
        return "event_orga";
    }

    return role;

}

document
.getElementById("loginForm")
.addEventListener(
"submit",

async (event) => {

    event.preventDefault();

    const email =
    document
    .getElementById("email")
    .value
    .trim();

    const password =
    document
    .getElementById("password")
    .value;

    try{

        const response =
        await fetch(
            "http://localhost:5000/login",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                    "application/json"
                },

                body: JSON.stringify({
                    email,
                    password
                })
            }
        );

        const data =
        await response.json();

        if(!response.ok){

            alert(
                data.message ||
                "Login gagal"
            );

            return;

        }

        if(!data.user){

            alert(
                "Data user tidak ditemukan"
            );

            return;

        }

        const accountRole =
        normalizeRole(
            data.user.role
        );

        const chosenRole =
        normalizeRole(
            selectedRole
        );

        if(accountRole !== chosenRole){

            alert(
                "Role akun tidak sesuai dengan pilihan login"
            );

            return;

        }

        // Simpan role yang sudah disamakan
        data.user.role =
        accountRole;

        localStorage.setItem(
            "user",
            JSON.stringify(data.user)
        );

        if(accountRole === "designer"){

            window.location.href =
            "../dashboard_designer/dashboard.html";

        }
        else if(accountRole === "event_orga"){

            window.location.href =
            "../dashboard_eo/dashboardeo.html";

        }
        else if(accountRole === "user"){

            window.location.href =
            "../home/home.html";

        }
        else{

            alert(
                "Role akun tidak dikenali: " +
                data.user.role
            );

        }

    }
    catch(error){

        console.error(error);

        alert(
            "Server tidak dapat dihubungi"
        );

    }

});
</script>
</body>
</html>
```
