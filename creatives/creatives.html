<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Creatives | DressVerse</title>

<link rel="stylesheet" href="creatives.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">
            DressVerse
        </div>

        <ul class="menu">

            <li>
                <a href="../home/home.html">Home</a>
            </li>

            <li>
                <a href="creatives.html" class="active">Our Creatives</a>
            </li>

            <li>
                <a href="../gallery/gallery.html">Gallery</a>
            </li>

            <li>
                <a href="../event/event.html">Event</a>
            </li>

            <li>
                <a href="../models/models.html">Join Our Models</a>
            </li>

        </ul>

        <a href="../login/login.html" class="login-btn" id="navbar-user">
            Login
        </a>

    </nav>

    <!-- TITLE -->

    <section class="title-section">

        <div class="blur blur1"></div>
        <div class="blur blur2"></div>

        <div class="line"></div>

        <h1>Meet Our Designer</h1>

        <div class="line"></div>

    </section>

    <!-- FEATURE CARDS -->

    <section class="cards">

    <div class="card rotate1">
        <img src="../foto/image 22.png" alt="Designer 1">
    </div>

    <div class="card rotate2">
        <img src="../foto/image 23.png" alt="Designer 2">
    </div>

    <div class="card rotate3">
        <img src="../foto/image 24.png" alt="Designer 3">
    </div>

    <div class="card rotate4">
        <img src="../foto/image 25.png" alt="Designer 4">
    </div>

    <div class="card rotate5">
        <img src="../foto/image 27.png" alt="Designer 5">
    </div>

</section>

    <!-- POPULAR -->

    <section class="popular">

        <div class="popular-blur blur-left"></div>
        <div class="popular-blur blur-right"></div>

        <h2>Most Popular Designer</h2>

        <div class="search-box">

            <input
            type="text"
            id="searchInput"
            placeholder="Search designer...">

        </div>

        <div class="popular-grid" id="popularGrid"></div>

    </section>

</div>

<script>

const nama =
localStorage.getItem("nama");

if(nama){

    document.getElementById("navbar-user").innerText =
    nama;

}

const popularGrid =
document.getElementById("popularGrid");

const searchInput =
document.getElementById("searchInput");

let designersData = [];

function getImageUrl(foto){
    if(!foto) return "";
    if(foto.startsWith("http") || foto.startsWith("../")) return foto;
    if(foto.startsWith("/")) return `/api${foto}`;
    if(foto.includes("uploads/")) return `/api/${foto}`;
    return `../foto/${foto}`;
}

function renderDesigners(data){

    popularGrid.innerHTML = "";

    if(!data || data.length === 0){

        for(let i = 0; i < 10; i++){

            popularGrid.innerHTML += `
                <div class="popular-card empty-card">

                    <div class="popular-image empty-image"></div>

                    <div class="popular-info">
                        <h3>— Nama Designer —</h3>
                        <p>👥 0 followers</p>
                        <p>❤ 0 likes</p>
                    </div>

                </div>
            `;

        }

        return;

    }

    data.forEach(item => {

        const fotoUrl = getImageUrl(item.foto_profile);

        const foto =
        item.foto_profile
        ? `<img src="${fotoUrl}" alt="${item.nickname}">`
        : `<div class="popular-image empty-image"></div>`;

        popularGrid.innerHTML += `
            <a
            href="designer.html?id=${item.id_desainer}"
            class="popular-card">

                <div class="popular-image">
                    ${foto}
                </div>

                <div class="popular-info">

                    <h3>
                        — ${item.nickname || "Nama Designer"} —
                    </h3>

                    <p>
                        👥 ${item.followers || 0} followers
                    </p>

                    <p>
                        ❤ ${item.likes || 0} likes
                    </p>

                </div>

            </a>
        `;

    });

}

async function loadDesigners(){

    try{

        const response =
        await fetch("/api/designers");

        const data =
        await response.json();

        designersData =
        data;

        renderDesigners(designersData);

    }catch(error){

        console.log(error);

        renderDesigners([]);

    }

}

searchInput.addEventListener("input", function(){

    const keyword =
    searchInput.value.toLowerCase();

    const filtered =
    designersData.filter(item => {

        return String(item.nickname || "")
        .toLowerCase()
        .includes(keyword);

    });

    renderDesigners(filtered);

});

loadDesigners();

</script>

</body>
</html>
