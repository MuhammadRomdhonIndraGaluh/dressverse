
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery</title>

    <link rel="stylesheet" href="gallery.css">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="logo">DressVerse</div>

        <ul class="menu">
            <li><a href="../home/home.html">Home</a></li>
            <li><a href="../creatives/creatives.html">Our Creatives</a></li>
            <li><a href="gallery.html" class="active">Gallery</a></li>
            <li><a href="../event/event.html">Event</a></li>
            <li><a href="../models/models.html">Join Our Models</a></li>
        </ul>

        <a href="../login/login.html"
        class="login-btn"
        id="navbar-user">

            LOGIN

        </a>

    </nav>

    <!-- HERO -->
    <section class="hero">

        <div class="hero-left">
            <h1>Own Your Style</h1>
            <p>All Creation’s from Indonesia</p>
        </div>

        <div class="hero-right">

            <div class="circle"></div>

            <img src="../foto/image 7.png" alt="Model">

        </div>

    </section>

    <!-- TITLE -->
    <section class="title">

        <div class="line"></div>
        <h2>Gallery</h2>
        <div class="line"></div>

    </section>

    <!-- SEARCH -->
    <section class="search-section">

        <div class="search-box">
            <input type="text" placeholder="Search...">
        </div>

    </section>

    <!-- CATEGORY -->
    <section class="category">

        <div class="category-item"
        onclick="filterGallery('All')">
            <p>All</p>
        </div>

        <div class="category-item"
        onclick="filterGallery('Dresses')">
            <p>Dresses</p>
        </div>

        <div class="category-item"
        onclick="filterGallery('T-Shirts')">
            <p>T-Shirts</p>
        </div>

        <div class="category-item"
        onclick="filterGallery('Pants')">
            <p>Pants</p>
        </div>

        <div class="category-item"
        onclick="filterGallery('Skirts')">
            <p>Skirts</p>
        </div>

        <div class="category-item"
        onclick="filterGallery('Jackets')">
            <p>Jackets</p>
        </div>

        <div class="category-item"
        onclick="filterGallery('Other')">
            <p>Other</p>
        </div>

    </section>

    <!-- GALLERY GRID -->
    
    <section class="gallery-grid" id="galleryGrid">

    </section>

</div>

<script>

async function loadGallery(kategori = "All") {

    try {

        let url =
        "http://localhost:5000/gallery";

        if (kategori !== "All") {

            url += `?kategori=${kategori}`;

        }

        const response =
        await fetch(url);

        const data =
        await response.json();

        const galleryGrid =
        document.getElementById("galleryGrid");

        galleryGrid.innerHTML = "";

        data.forEach(item => {

            galleryGrid.innerHTML += `

                <a href="fashion.html?id=${item.id_karya}"
                class="gallery-card">

                    <img src="../foto/${item.foto_karya}">

                </a>

            `;

        });

    } catch (error) {

        console.log(error);

    }

}

function filterGallery(kategori) {

    loadGallery(kategori);

}

loadGallery();

const nama =
localStorage.getItem("nama");

if (nama) {

    document
    .getElementById("navbar-user")
    .innerText = nama;

}

</script>

</body>
</html>
